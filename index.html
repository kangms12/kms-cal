<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KMScalendar MAX</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --point-black: #000000; --bg-white: #ffffff; --text-gray: #888888; --light-gray: #f4f4f4; --red: #ff5b5b; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-white); color: var(--point-black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 스플래시 */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-white); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .splash-logo { width: 80px; height: 80px; background: var(--point-black); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* 레이아웃 */
        .page { flex: 1; display: none; overflow-y: auto; padding-bottom: 100px; }
        .page.active { display: flex; flex-direction: column; }
        #tab1.page { padding: 0 !important; height: calc(100vh - 75px); } /* 캘린더 전용: 꽉 차게 */
        header { padding: 15px 20px; border-bottom: 2px solid var(--point-black); display: flex; align-items: center; gap: 15px; background: white; z-index: 10; }
        h2 { margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; }

        /* 캘린더 사이드 메뉴 */
        .menu-btn { font-size: 24px; cursor: pointer; padding-right: 5px; }
        #viewMenu { 
            display: none; position: absolute; top: 60px; left: 15px; 
            background: white; border: 2px solid black; z-index: 2000; 
            box-shadow: 4px 4px 0px black; border-radius: 8px;
        }
        .view-opt { padding: 12px 20px; font-size: 13px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; }
        #calendar-container { flex: 1; overflow: hidden; position: relative; }
        #calendar { height: 100% !important; }

        /* 공통 UI */
        .content-padding { padding: 20px; }
        .input-under { width:100%; border:none; border-bottom:2px solid black; margin-bottom:15px; padding: 10px 0; font-size: 16px; outline: none; background: transparent; }
        .save-btn { width: 100%; padding: 12px; background: black; color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .list-item { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee; }
        
        /* 하단 탭 바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; border-top: 2px solid black; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: bold; color: #ccc; align-self: center; cursor: pointer; }
        .nav-item.active { color: black; }
        .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* 모달 */
        #eventModal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 75%; background: white; border-top: 3px solid black; z-index: 1000; padding: 25px; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
        .color-circle { width: 25px; height: 25px; border-radius: 50%; display: inline-block; margin-right: 10px; cursor: pointer; border: 2px solid transparent; }
        .color-circle.selected { border-color: black; transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="splash"><div class="splash-logo">KMS</div></div>

    <div id="tab1" class="page active">
        <header>
            <div class="menu-btn" onclick="toggleViewMenu()">☰</div>
            <h2>Calendar</h2>
        </header>
        <div id="viewMenu">
            <div class="view-opt" onclick="changeView('dayGridMonth')">월별 보기</div>
            <div class="view-opt" onclick="changeView('timeGridWeek')">주별 보기</div>
            <div class="view-opt" onclick="changeView('timeGridDay')">일별 보기</div>
        </div>
        <div id="calendar-container"><div id="calendar"></div></div>
    </div>

    <div id="tab2" class="page content-padding">
        <header style="padding:10px 0; border-bottom:2px solid black; margin-bottom:20px;"><h2>To-Do List</h2></header>
        <div style="border:2px solid black; padding:15px; margin-bottom:20px; border-radius:10px;">
            <input type="text" id="todoInput" class="input-under" placeholder="할 일 입력">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="date" id="todoDate" style="flex:1.2; padding:8px; border:1px solid #ccc; border-radius:5px;">
                <select id="todoCat" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:5px; background:white;"></select>
            </div>
            <button onclick="addTodo()" class="save-btn">ADD TASK</button>
        </div>
        <div id="catFilters" style="margin-bottom:15px; display:flex; gap:8px; overflow-x:auto;"></div>
        <ul id="todoList" style="list-style:none; padding:0;"></ul>
    </div>

    <div id="tab3" class="page content-padding">
        <header style="padding:10px 0; border-bottom:2px solid black; margin-bottom:20px;"><h2>Goals</h2></header>
        <div style="display:flex; border:2px solid black; margin-bottom:20px; border-radius:10px; overflow:hidden;">
            <input type="text" id="goalInput" style="flex:1; padding:15px; border:none; outline:none;" placeholder="목표 설정...">
            <button onclick="addGoal()" style="background:black; color:white; border:none; padding:0 20px; font-weight:bold;">SET</button>
        </div>
        <ul id="goalList" style="list-style:none; padding:0;"></ul>
    </div>

    <div id="tab4" class="page content-padding">
        <header style="padding:10px 0; border-bottom:2px solid black; margin-bottom:20px;"><h2>Achieve</h2></header>
        <div style="text-align: center; padding: 40px 0;">
            <div style="margin-bottom:30px;"><p>TO-DO</p><h1 id="todoPercent" style="font-size:60px; margin:0;">0%</h1></div>
            <div><p>GOAL</p><h1 id="goalPercent" style="font-size:60px; margin:0;">0%</h1></div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="eventModal">
        <p id="selectedDateText" style="color:#888; font-weight:bold;"></p>
        <input type="text" id="eventTitle" placeholder="일정 제목" class="input-under">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span>종일</span><input type="checkbox" id="isAllDay" onchange="toggleTime()" style="width:20px; height:20px;">
        </div>
        <div id="timeBox" style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
            <input type="time" id="startTime" value="09:00"><input type="time" id="endTime" value="10:00">
        </div>
        <button id="modalBtn" class="save-btn" onclick="saveEvent()">SAVE</button>
        <div id="deleteBtnContainer" style="margin-top:15px; text-align:center;"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab(1)"><span class="nav-icon">🗓</span>CAL</div>
        <div class="nav-item" onclick="showTab(2)"><span class="nav-icon">✔</span>TODO</div>
        <div class="nav-item" onclick="showTab(3)"><span class="nav-icon">🎯</span>GOAL</div>
        <div class="nav-item" onclick="showTab(4)"><span class="nav-icon">📈</span>STAT</div>
    </nav>

    <script>
        let calendar;
        let selectedDate = '';
        let editingEventId = null;
        let events = JSON.parse(localStorage.getItem('kms_events')) || [];
        let todos = JSON.parse(localStorage.getItem('kms_todos')) || [];
        let goals = JSON.parse(localStorage.getItem('kms_goals')) || [];
        let categories = JSON.parse(localStorage.getItem('kms_categories')) || ['일반', '업무', '공부'];

        window.onload = () => {
            initCalendar();
            renderCategoryUI();
            saveAndRenderTodo();
            renderGoals();
            setTimeout(() => { document.getElementById('splash').style.display='none'; }, 1000);
        };

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: '100%',
                headerToolbar: { left: 'title', right: 'prev,next' },
                events: events,
                dateClick: (info) => openModal(info.dateStr),
                eventClick: (info) => openEditModal(info.event)
            });
            calendar.render();
        }

        function toggleViewMenu() { 
            const m = document.getElementById('viewMenu'); 
            m.style.display = (m.style.display === 'block') ? 'none' : 'block'; 
        }
        function changeView(v) { calendar.changeView(v); toggleViewMenu(); }

        function openModal(date) {
            editingEventId = null; selectedDate = date;
            document.getElementById('selectedDateText').innerText = date + " 일정 추가";
            document.getElementById('eventTitle').value = '';
            document.getElementById('deleteBtnContainer').innerHTML = '';
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function openEditModal(eventObj) {
            editingEventId = eventObj.id;
            document.getElementById('eventTitle').value = eventObj.title;
            document.getElementById('deleteBtnContainer').innerHTML = `<span style="color:red; cursor:pointer;" onclick="deleteEvent('${eventObj.id}')">삭제하기</span>`;
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value;
            if(!title) return;
            if(editingEventId) { events = events.filter(e => e.id !== editingEventId); calendar.getEventById(editingEventId).remove(); }
            const newEvent = { id: String(Date.now()), title: title, start: selectedDate, allDay: true, backgroundColor: 'black', borderColor: 'black' };
            events.push(newEvent);
            localStorage.setItem('kms_events', JSON.stringify(events));
            calendar.addEvent(newEvent);
            closeModal();
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            localStorage.setItem('kms_events', JSON.stringify(events));
            calendar.getEventById(id).remove();
            closeModal();
        }

        function closeModal() { document.getElementById('eventModal').style.display='none'; document.getElementById('modalOverlay').style.display='none'; }
        function toggleTime() {}

        /* 투두/목표/통계 (기존 로직 유지) */
        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            todos.push({ id: Date.now(), text: input.value, done: false, category: document.getElementById('todoCat').value });
            input.value = ''; saveAndRenderTodo();
        }
        function saveAndRenderTodo() {
            localStorage.setItem('kms_todos', JSON.stringify(todos));
            document.getElementById('todoList').innerHTML = todos.map(t => `
                <li class="list-item">
                    <span onclick="toggleTodo(${t.id})" style="${t.done?'text-decoration:line-through;color:#ccc':''}">${t.text}</span>
                    <button onclick="delTodo(${t.id})" style="border:none; background:none; color:red;">삭제</button>
                </li>
            `).join('');
        }
        function toggleTodo(id) { const i = todos.findIndex(t=>t.id===id); todos[i].done = !todos[i].done; saveAndRenderTodo(); }
        function delTodo(id) { todos = todos.filter(t=>t.id!==id); saveAndRenderTodo(); }
        function renderCategoryUI() { document.getElementById('todoCat').innerHTML = categories.map(c => `<option>${c}</option>`).join(''); }

        function addGoal() {
            const input = document.getElementById('goalInput');
            if(!input.value) return;
            goals.push({ id: Date.now(), text: input.value, done: false });
            input.value = ''; renderGoals();
        }
        function renderGoals() {
            localStorage.setItem('kms_goals', JSON.stringify(goals));
            document.getElementById('goalList').innerHTML = goals.map(g => `
                <li class="list-item">
                    <span onclick="toggleGoal(${g.id})" style="${g.done?'text-decoration:line-through;color:#ccc':''}">${g.text}</span>
                    <button onclick="delGoal(${g.id})" style="border:none; background:none; color:#ccc;">삭제</button>
                </li>
            `).join('');
        }
        function toggleGoal(id) { const i = goals.findIndex(g=>g.id===id); goals[i].done = !goals[i].done; renderGoals(); }
        function delGoal(id) { goals = goals.filter(g=>g.id!==id); renderGoals(); }

        function showTab(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab' + num).classList.add('active');
            document.querySelectorAll('.nav-item')[num-1].classList.add('active');
            if(num === 1) setTimeout(() => calendar.updateSize(), 10);
            if(num === 4) {
                const tP = todos.length ? Math.round((todos.filter(t=>t.done).length/todos.length)*100) : 0;
                const gP = goals.length ? Math.round((goals.filter(g=>g.done).length/goals.length)*100) : 0;
                document.getElementById('todoPercent').innerText = tP + "%";
                document.getElementById('goalPercent').innerText = gP + "%";
            }
        }
    </script>
</body>
</html>

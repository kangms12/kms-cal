<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KMScalendar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --point-black: #000000; --bg-white: #ffffff; --light-gray: #f2f2f2; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-white); color: var(--point-black); height: 100vh; display: flex; flex-direction: column; }
        
        /* 1. 스플래시 화면 (Black & White) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-white); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-logo { width: 80px; height: 80px; background: var(--point-black); border-radius: 0; /* 각진 디자인 */
                       display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }

        /* 2. 레이아웃 */
        .page { flex: 1; padding: 25px; display: none; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        header { padding: 20px 0; border-bottom: 2px solid var(--point-black); margin-bottom: 25px; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* 3. 투두 & 목표 (모던 블랙 스타일) */
        .input-group { display: flex; gap: 0; margin-bottom: 25px; border: 2px solid var(--point-black); }
        input { flex: 1; padding: 12px; border: none; font-size: 16px; outline: none; }
        button.add-btn { background: var(--point-black); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }
        
        .item-list { list-style: none; padding: 0; }
        .item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .item.done { opacity: 0.3; }
        .item input[type="checkbox"] { 
            appearance: none; width: 18px; height: 18px; border: 2px solid var(--point-black); 
            margin-right: 15px; cursor: pointer; position: relative;
        }
        .item input[type="checkbox"]:checked { background: var(--point-black); }
        .item input[type="checkbox"]:checked::after { content: '✔'; color: white; font-size: 12px; position: absolute; left: 2px; top: -1px; }

        /* 4. 캘린더 커스텀 (블랙 & 화이트) */
        .fc { --fc-border-color: #eee; --fc-today-bg-color: #f2f2f2; }
        .fc .fc-toolbar-title { font-size: 18px; font-weight: bold; }
        .fc .fc-button-primary { background-color: var(--point-black); border: none; }

        /* 5. 하단 탭 바 (미니멀) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-white); 
                   border-top: 2px solid var(--point-black); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { font-size: 10px; color: #999; text-align: center; flex: 1; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--point-black); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">KMS</div>
        <p style="margin-top: 15px; font-weight: 800; letter-spacing: 3px;">KMSCALENDAR</p>
    </div>

    <div id="tab1" class="page active">
        <header><h2>Calendar</h2></header>
        <div id="calendar"></div>
    </div>

    <div id="tab2" class="page">
        <header><h2>To-Do List</h2></header>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Add task...">
            <button class="add-btn" onclick="addTodo()">ADD</button>
        </div>
        <ul id="todoList" class="item-list"></ul>
    </div>

    <div id="tab3" class="page">
        <header><h2>Goals</h2></header>
        <div class="input-group">
            <input type="text" id="goalInput" placeholder="Set new goal...">
            <button class="add-btn" onclick="addGoal()">SET</button>
        </div>
        <ul id="goalList" class="item-list"></ul>
    </div>

    <div id="tab4" class="page">
        <header><h2>Achieve</h2></header>
        <div style="text-align: center; padding: 60px 20px;">
            <h1 style="font-size: 80px; margin: 0; letter-spacing: -3px;" id="percentText">0%</h1>
            <p style="font-weight: bold; letter-spacing: 1px;" id="statMsg">KEEP GOING</p>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab(1)"> <span class="nav-icon">🗓</span> CAL </div>
        <div class="nav-item" onclick="showTab(2)"> <span class="nav-icon">✔</span> TODO </div>
        <div class="nav-item" onclick="showTab(3)"> <span class="nav-icon">🎯</span> GOAL </div>
        <div class="nav-item" onclick="showTab(4)"> <span class="nav-icon">📈</span> STAT </div>
    </nav>

    <script>
        window.onload = () => {
            initCalendar();
            renderTodos();
            renderGoals();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }, 1200);
        };

        function initCalendar() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' }
            });
            calendar.render();
        }

        function showTab(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab' + num).classList.add('active');
            event.currentTarget.classList.add('active');
            if(num === 4) updateStats();
        }

        let todos = JSON.parse(localStorage.getItem('kms_todos')) || [];
        let goals = JSON.parse(localStorage.getItem('kms_goals')) || [];

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            todos.push({ text: input.value, done: false });
            input.value = '';
            saveAndRenderTodo();
        }

        function addGoal() {
            const input = document.getElementById('goalInput');
            if(!input.value) return;
            goals.push({ text: input.value });
            input.value = '';
            saveAndRenderGoal();
        }

        function saveAndRenderTodo() {
            localStorage.setItem('kms_todos', JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            list.innerHTML = todos.map((t, i) => `
                <li class="item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
                    <span>${t.text}</span>
                </li>
            `).join('');
        }

        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            saveAndRenderTodo();
        }

        function saveAndRenderGoal() {
            localStorage.setItem('kms_goals', JSON.stringify(goals));
            renderGoals();
        }

        function renderGoals() {
            document.getElementById('goalList').innerHTML = goals.map(g => `
                <li class="item">▪ ${g.text}</li>
            `).join('');
        }

        function updateStats() {
            if(todos.length === 0) {
                document.getElementById('percentText').innerText = "0%";
                return;
            }
            const doneCount = todos.filter(t => t.done).length;
            const percent = Math.round((doneCount / todos.length) * 100);
            document.getElementById('percentText').innerText = percent + "%";
            document.getElementById('statMsg').innerText = percent === 100 ? 'PERFECT' : 'KEEP GOING';
        }
    </script>
</body>
</html>

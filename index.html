<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KMScalendar</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --point-black: #000000; --bg-white: #ffffff; --text-gray: #888888; --light-gray: #f4f4f4; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-white); color: var(--point-black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-white); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .splash-logo { width: 80px; height: 80px; background: var(--point-black); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        .page { flex: 1; padding: 20px; display: none; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        header { padding: 10px 0; border-bottom: 2px solid var(--point-black); margin-bottom: 20px; }
        h2 { margin: 0; font-size: 20px; font-weight: 900; text-transform: uppercase; }
        .input-under { width:100%; border:none; border-bottom:2px solid black; margin-bottom:15px; padding: 10px 0; font-size: 16px; outline: none; }
        .save-btn { width: 100%; padding: 12px; background: black; color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-white); border-top: 2px solid var(--point-black); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { font-size: 10px; color: #ccc; text-align: center; flex: 1; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--point-black); }
        .stat-card { background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid black; }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .progress-inner { height: 100%; background: black; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">KMS</div>
        <p style="margin-top: 15px; font-weight: 800; letter-spacing: 3px;">KMSCALENDAR</p>
    </div>

    <div id="tab1" class="page active"><header><h2>Calendar</h2></header><div id="calendar"></div></div>

    <div id="tab2" class="page">
        <header><h2>To-Do List</h2></header>
        <div style="border:2px solid black; padding:15px; margin-bottom:20px; border-radius:10px;">

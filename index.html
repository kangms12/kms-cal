<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KMScalendar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --point-black: #000000; --bg-white: #ffffff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-white); color: var(--point-black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 스플래시 */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        .splash-logo { width: 80px; height: 80px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* 페이지 레이아웃 */
        .page { flex: 1; padding: 25px; display: none; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        header { padding: 10px 0; border-bottom: 2px solid #000; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; }

        /* 캘린더 UI 커스텀 */
        .fc { --fc-border-color: transparent; font-size: 14px; }
        .fc .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 800; }
        .fc .fc-col-header-cell-cushion { color: #999; font-size: 11px; text-decoration: none; }
        .fc .fc-daygrid-day-number { color: #000; padding: 8px !important; text-decoration: none; }
        .fc .fc-day-today { background: transparent !important; }
        .fc .fc-day-today .fc-daygrid-day-number { background: #000; color: #fff !important; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin: 4px auto; }
        .fc-event { background: #000 !important; border: none !important; font-size: 10px; padding: 2px; }

        /* 입력 모달 (팝업) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; width: 80%; border: 2px solid #000; }
        .modal-content h3 { margin-top: 0; }
        .modal-content input { width: 100%; padding: 10px; border: 1px solid #ddd; margin: 15px 0; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; font-weight: bold; cursor: pointer; }
        .save-btn { background: #000; color: #fff; }
        .close-btn { background: #eee; color: #333; }

        /* 하단바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #fff; border-top: 2px solid #000; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { font-size: 10px; color: #999; text-align: center; flex: 1; font-weight: bold; }
        .nav-item.active { color: #000; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">KMS</div>
        <p style="margin-top: 15px; font-weight: 800; letter-spacing: 3px;">KMSCALENDAR</p>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="selectedDateText">날짜</h3>
            <input type="text" id="eventInput" placeholder="할 일을 적으세요">
            <div class="modal-btns">
                <button class="save-btn" onclick="saveEvent()">저장</button>
                <button class="close-btn" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="tab1" class="page active">
        <header><h2>Calendar</h2></header>
        <div id="calendar"></div>
    </div>

    <div id="tab2" class="page"><header><h2>To-Do List</h2></header></div>
    <div id="tab3" class="page"><header><h2>Goals</h2></header></div>
    <div id="tab4" class="page"><header><h2>Achieve</h2></header></div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab(1)"> <span class="nav-icon">🗓</span> CAL </div>
        <div class="nav-item" onclick="showTab(2)"> <span class="nav-icon">✔</span> TODO </div>
        <div class="nav-item" onclick="showTab(3)"> <span class="nav-icon">🎯</span> GOAL </div>
        <div class="nav-item" onclick="showTab(4)"> <span class="nav-icon">📈</span> STAT </div>
    </nav>

    <script>
        let calendar;
        let selectedDateStr;
        let calendarEvents = JSON.parse(localStorage.getItem('kms_events')) || [];

        window.onload = () => {
            initCalendar();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }, 1200);
        };

        function initCalendar() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: { left: 'title', right: 'prev,next' },
                events: calendarEvents,
                dateClick: function(info) {
                    selectedDateStr = info.dateStr;
                    document.getElementById('selectedDateText').innerText = selectedDateStr;
                    document.getElementById('modal').style.display = 'flex';
                }
            });
            calendar.render();
        }

        function saveEvent() {
            const title = document.getElementById('eventInput').value;
            if (title) {
                const newEvent = { title: title, start: selectedDateStr, allDay: true };
                calendarEvents.push(newEvent);
                calendar.addEvent(newEvent);
                localStorage.setItem('kms_events', JSON.stringify(calendarEvents));
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('eventInput').value = '';
        }

        function showTab(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab' + num).classList.add('active');
            event.currentTarget.classList.add('active');
            if(num === 1) calendar.render(); // 탭 전환 시 캘린더 깨짐 방지
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KMScalendar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --point-black: #000000; --bg-white: #ffffff; --light-gray: #f2f2f2; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-white); color: var(--point-black); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 1. 스플래시 화면 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-white); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .splash-logo { width: 80px; height: 80px; background: var(--point-black); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }

        /* 2. 레이아웃 */
        .page { flex: 1; padding: 25px; display: none; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        header { padding: 20px 0; border-bottom: 2px solid var(--point-black); margin-bottom: 25px; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* 3. 투두 & 목표 */
        .input-group { display: flex; gap: 0; margin-bottom: 25px; border: 2px solid var(--point-black); }
        input, select { flex: 1; padding: 12px; border: none; font-size: 16px; outline: none; }
        button.add-btn { background: var(--point-black); color: white; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }
        
        .item-list { list-style: none; padding: 0; }
        .item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid #eee; }
        .item.done { opacity: 0.3; }

        /* 4. 캘린더 커스텀 */
        #calendar { margin-top: 10px; }
        .fc { --fc-border-color: #eee; --fc-today-bg-color: #f2f2f2; }
        .fc .fc-toolbar-title { font-size: 18px; font-weight: bold; }
        .fc .fc-button-primary { background-color: var(--point-black); border: none; }

        /* 5. 하단 탭 바 */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--bg-white); 
                   border-top: 2px solid var(--point-black); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { font-size: 10px; color: #999; text-align: center; flex: 1; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--point-black); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        /* 6. 일정 추가 모달 (추가됨) */
        #eventModal {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 80%;
            background: white; border-top: 3px solid black; z-index: 1000; padding: 25px;
            box-sizing: border-box; transition: transform 0.3s ease-out;
        }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin-right: 10px; cursor: pointer; border: 2px solid transparent; }
        .color-circle.selected { border-color: black; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">KMS</div>
        <p style="margin-top: 15px; font-weight: 800; letter-spacing: 3px;">KMSCALENDAR</p>
    </div>

    <div id="tab1" class="page active">
        <header><h2>Calendar</h2></header>
        <div id="calendar"></div>
    </div>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
    <div id="eventModal">
        <h3 id="selectedDateText" style="margin-top:0;">날짜 선택됨</h3>
        <input type="text" id="eventTitle" placeholder="일정 제목" style="width:100%; border-bottom:2px solid black; margin-bottom:20px; font-size:20px;">
        
        <div style="margin-bottom:15px; display:flex; align-items:center; justify-content:space-between;">
            <span>종일</span>
            <input type="checkbox" id="isAllDay" onchange="toggleTimeInput()" style="flex:none; width:20px; height:20px;">
        </div>

        <div id="timeInputGroup" style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="time" id="startTime"> <span>~</span> <input type="time" id="endTime">
        </div>

        <div style="margin-bottom:20px;">
            <label>🔔 알림</label>
            <select id="eventReminder">
                <option value="none">없음</option>
                <option value="5">5분 전</option>
                <option value="30" selected>30분 전</option>
                <option value="60">1시간 전</option>
            </select>
        </div>

        <div style="margin-bottom:25px;">
            <label style="display:block; margin-bottom:10px;">🎨 색상</label>
            <div id="colorPicker">
                <div class="color-circle selected" style="background:#000;" onclick="selectColor('#000', this)"></div>
                <div class="color-circle" style="background:#ff5b5b;" onclick="selectColor('#ff5b5b', this)"></div>
                <div class="color-circle" style="background:#5b99ff;" onclick="selectColor('#5b99ff', this)"></div>
                <div class="color-circle" style="background:#5bff8d;" onclick="selectColor('#5bff8d', this)"></div>
            </div>
        </div>

        <button class="add-btn" style="width:100%; height:50px; font-size:18px;" onclick="saveEvent()">SAVE EVENT</button>
    </div>

    <div id="tab2" class="page">
        <header><h2>To-Do List</h2></header>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Add task...">
            <button class="add-btn" onclick="addTodo()">ADD</button>
        </div>
        <ul id="todoList" class="item-list"></ul>
    </div>

    <div id="tab3" class="page">
        <header><h2>Goals</h2></header>
        <div class="input-group">
            <input type="text" id="goalInput" placeholder="Set new goal...">
            <button class="add-btn" onclick="addGoal()">SET</button>
        </div>
        <ul id="goalList" class="item-list"></ul>
    </div>

    <div id="tab4" class="page">
        <header><h2>Achieve</h2></header>
        <div style="text-align: center; padding: 60px 20px;">
            <h1 style="font-size: 80px; margin: 0; letter-spacing: -3px;" id="percentText">0%</h1>
            <p style="font-weight: bold; letter-spacing: 1px;" id="statMsg">KEEP GOING</p>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab(1)"> <span class="nav-icon">🗓</span> CAL </div>
        <div class="nav-item" onclick="showTab(2)"> <span class="nav-icon">✔</span> TODO </div>
        <div class="nav-item" onclick="showTab(3)"> <span class="nav-icon">🎯</span> GOAL </div>
        <div class="nav-item" onclick="showTab(4)"> <span class="nav-icon">📈</span> STAT </div>
    </nav>

    <script>
        let calendar;
        let selectedDate = '';
        let selectedColor = '#000';
        let events = JSON.parse(localStorage.getItem('kms_events')) || [];

        window.onload = () => {
            initCalendar();
            renderTodos();
            renderGoals();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }, 1200);
        };

        function initCalendar() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                events: events,
                dateClick: function(info) {
                    openModal(info.dateStr);
                }
            });
            calendar.render();
        }

        // 모달 제어 로직
        function openModal(date) {
            selectedDate = date;
            document.getElementById('selectedDateText').innerText = date;
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function toggleTimeInput() {
            const isAllDay = document.getElementById('isAllDay').checked;
            document.getElementById('timeInputGroup').style.display = isAllDay ? 'none' : 'flex';
        }

        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value;
            if(!title) return alert('제목을 입력해주세요!');

            const isAllDay = document.getElementById('isAllDay').checked;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            const newEvent = {
                title: title,
                start: isAllDay ? selectedDate : selectedDate + 'T' + startTime,
                end: isAllDay ? selectedDate : selectedDate + 'T' + endTime,
                allDay: isAllDay,
                backgroundColor: selectedColor,
                borderColor: selectedColor
            };

            events.push(newEvent);
            localStorage.setItem('kms_events', JSON.stringify(events));
            calendar.addEvent(newEvent);
            
            // 초기화 후 닫기
            document.getElementById('eventTitle').value = '';
            closeModal();
        }

        // 탭 전환 & 투두 로직 (기존과 동일)
        function showTab(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab' + num).classList.add('active');
            event.currentTarget.classList.add('active');
            if(num === 4) updateStats();
        }

        let todos = JSON.parse(localStorage.getItem('kms_todos')) || [];
        let goals = JSON.parse(localStorage.getItem('kms_goals')) || [];

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            todos.push({ text: input.value, done: false });
            input.value = '';
            saveAndRenderTodo();
        }

        function addGoal() {
            const input = document.getElementById('goalInput');
            if(!input.value) return;
            goals.push({ text: input.value });
            input.value = '';
            saveAndRenderGoal();
        }

        function saveAndRenderTodo() {
            localStorage.setItem('kms_todos', JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            list.innerHTML = todos.map((t, i) => `
                <li class="item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
                    <span>${t.text}</span>
                </li>
            `).join('');
        }

        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            saveAndRenderTodo();
        }

        function saveAndRenderGoal() {
            localStorage.setItem('kms_goals', JSON.stringify(goals));
            renderGoals();
        }

        function renderGoals() {
            document.getElementById('goalList').innerHTML = goals.map(g => `
                <li class="item">▪ ${g.text}</li>
            `).join('');
        }

        function updateStats() {
            if(todos.length === 0) {
                document.getElementById('percentText').innerText = "0%";
                return;
            }
            const doneCount = todos.filter(t => t.done).length;
            const percent = Math.round((doneCount / todos.length) * 100);
            document.getElementById('percentText').innerText = percent + "%";
            document.getElementById('statMsg').innerText = percent === 100 ? 'PERFECT' : 'KEEP GOING';
        }
    </script>
</body>
</html>
